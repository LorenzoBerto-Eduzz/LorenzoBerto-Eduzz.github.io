<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eduzz Tools</title>
  <meta name="description" content="Portfolio of public GitHub projects by Lorenzo Berto.">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="bg-glow bg-glow-a"></div>
  <div class="bg-glow bg-glow-b"></div>

  <main class="container">
    <header class="hero">
      <h1>Eduzz Tools</h1>
      <a class="byline byline-link" href="https://github.com/LorenzoBerto-Eduzz" target="_blank" rel="noopener noreferrer">
        de Lorenzo Berto
      </a>
    </header>

    <section>
      <div id="projects-grid" class="projects-grid" aria-live="polite"></div>
    </section>
  </main>

  <template id="project-card-template">
    <a class="project-card" target="_blank" rel="noopener noreferrer">
      <div class="project-image-wrap">
        <img class="project-image" alt="">
      </div>
      <div class="project-meta">
        <h2 class="project-name"></h2>
        <p class="project-desc"></p>
      </div>
    </a>
  </template>

  <script src="./script.js"></script>
</body>
</html>
